<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skicák</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNyIgZmlsbD0iIzI1NjNlYiIvPgogIDx0ZXh0IHg9IjE2IiB5PSIyMyIgZm9udC1mYW1pbHk9IkFyaWFsIEJsYWNrLHNhbnMtc2VyaWYiIGZvbnQtd2VpZ2h0PSI5MDAiIGZvbnQtc2l6ZT0iMjIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IndoaXRlIiBsZXR0ZXItc3BhY2luZz0iLTEiPlM8L3RleHQ+Cjwvc3ZnPg==">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e1621">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Skicák">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --n0:#0e1621;--n1:#131f30;--n2:#182538;--n3:#1e2e42;--n4:#263a52;--n5:#2f4563;
  --bl:#2563eb;--bll:#3b82f6;--blp:#1a3460;
  --wh:#f1f5f9;--dim:#cbd5e1;--mu:#8899aa;--mu2:#607080;
  --ok:#10b981;--warn:#f59e0b;--err:#ef4444;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.12);--bd3:rgba(255,255,255,.2);
  --r:8px;--rl:13px;--sw:210px;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--n0);color:var(--wh);font-size:13px}
/* LOADER */
#loader{position:fixed;inset:0;background:var(--n0);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:18px}
.spin-logo{width:56px;height:56px;border-radius:12px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-family:'Arial Black',sans-serif;font-size:28px;font-weight:900;color:#fff;letter-spacing:-2px;animation:spinpulse 1.1s cubic-bezier(.68,-.55,.27,1.55) infinite}
@keyframes spinpulse{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(.82)}100%{transform:rotate(360deg) scale(1)}}
#loader p{color:var(--mu);font-size:13px}
/* LAYOUT */
#app{display:flex;height:100vh;opacity:0;transition:opacity .3s}
#app.ready{opacity:1}
/* SIDEBAR */
#sb{width:var(--sw);background:var(--n1);border-right:1px solid var(--bd2);display:flex;flex-direction:column;flex-shrink:0}
.sb-top{padding:14px 13px 11px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;gap:9px}
.logo{width:32px;height:32px;border-radius:7px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-family:'Arial Black',sans-serif;font-size:16px;font-weight:900;color:#fff;flex-shrink:0;letter-spacing:-1px}
.logo-t{font-size:15px;font-weight:600;color:var(--wh)}
.sb-srch{padding:8px 10px 5px}
.sb-srch input{width:100%;background:var(--n3);border:1px solid var(--bd2);border-radius:7px;padding:6px 10px;color:var(--wh);font-family:var(--font);font-size:12px;outline:none}
.sb-srch input::placeholder{color:var(--mu)}
.sb-srch input:focus{border-color:var(--bl)}
.sb-nav{flex:1;padding:4px 7px;overflow-y:auto}
.nlbl{font-size:10px;font-weight:600;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;padding:7px 7px 3px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;color:var(--dim);font-size:12px;transition:all .12s;margin-bottom:1px;user-select:none}
.ni:hover{background:var(--n3);color:var(--wh)}
.ni.on{background:var(--blp);color:var(--wh);font-weight:500}
.nic{width:15px;text-align:center;font-size:13px;flex-shrink:0}
.nbdg{margin-left:auto;background:var(--bl);color:#fff;font-size:9px;font-weight:700;border-radius:9px;padding:1px 6px;font-family:var(--mono)}
.sb-foot{padding:9px;border-top:1px solid var(--bd2)}
.uchip{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--n3);border-radius:8px;cursor:pointer;border:1px solid var(--bd2);transition:all .12s}
.uchip:hover{background:var(--n4)}
.uav{width:28px;height:28px;border-radius:7px;background:var(--bl);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.un{font-size:12px;font-weight:500;color:var(--wh)}.ur{font-size:10px;color:var(--mu)}
.sb-btns{display:flex;gap:5px;margin-top:7px}
.sb-btn{flex:1;background:var(--n3);border:1px solid var(--bd2);border-radius:7px;padding:6px;font-family:var(--font);font-size:11px;color:var(--wh);cursor:pointer;transition:all .12s;font-weight:500}
.sb-btn:hover{background:var(--n4)}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:47px;border-bottom:1px solid var(--bd2);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;background:var(--n1)}
.tb-t{font-size:15px;font-weight:600;color:var(--wh)}.tb-s{font-size:12px;color:var(--mu)}.tb-sp{flex:1}
#content{flex:1;overflow-y:auto;padding:18px}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;border:none;transition:all .15s;color:#fff;white-space:nowrap}
.bp{background:var(--bl)}.bp:hover{background:var(--bll)}
.bg{background:var(--n4);border:1px solid var(--bd2)}.bg:hover{background:var(--n5)}
.bok{background:rgba(16,185,129,.2);border:1px solid rgba(16,185,129,.35);color:#d1fae5!important}.bok:hover{background:rgba(16,185,129,.3)}
.brd{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.3);color:#fecaca!important}.brd:hover{background:rgba(239,68,68,.28)}
.bai{background:linear-gradient(135deg,#2563eb,#7c3aed)}.bai:hover{filter:brightness(1.15)}
.bs{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:.45;cursor:default}
.bi{padding:5px 8px;border-radius:7px;background:var(--n4);border:1px solid var(--bd2);cursor:pointer;color:var(--wh);transition:all .12s;font-family:var(--font);font-size:12px}.bi:hover{background:var(--n5)}
/* STATS / CARDS */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
.sc{background:var(--n2);border:1px solid var(--bd2);border-radius:var(--r);padding:12px 14px;cursor:pointer;transition:all .15s}
.sc:hover{border-color:var(--bd3);background:var(--n3)}
.sl{font-size:10px;color:var(--mu);font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.sv{font-size:24px;font-weight:600;margin-top:4px;font-family:var(--mono);color:var(--wh)}
/* LIST */
.li{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--n2);border:1px solid var(--bd2);border-radius:var(--r);margin-bottom:6px;cursor:pointer;transition:all .12s}
.li:hover{border-color:var(--bd3);background:var(--n3)}
.lim{flex:1;min-width:0}.lit{font-size:13px;font-weight:500;color:var(--wh);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lis{font-size:11px;color:var(--mu);margin-top:2px}
.lir{display:flex;align-items:center;gap:6px;flex-shrink:0}
/* AVATAR */
.av{width:32px;height:32px;border-radius:8px;background:var(--blp);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--bll);flex-shrink:0}
.avsm{width:24px;height:24px;border-radius:6px;font-size:9px}.avxs{width:19px;height:19px;border-radius:4px;font-size:8px}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer}
.bbl{background:rgba(37,99,235,.22);color:#93c5fd}.bgr{background:rgba(16,185,129,.18);color:#6ee7b7}.bgr2{background:rgba(148,163,184,.1);color:var(--mu)}
.bpin{background:rgba(245,158,11,.2);color:#fcd34d;border:1px solid rgba(245,158,11,.3)}
.srun{background:rgba(16,185,129,.18);color:#34d399}.sstp{background:rgba(239,68,68,.18);color:#f87171}.sdon{background:rgba(148,163,184,.1);color:var(--mu)}.sprp{background:rgba(245,158,11,.18);color:#fbbf24}
/* FILTERS */
.flt{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px;align-items:center}
.fb{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid var(--bd2);background:transparent;color:var(--dim);font-family:var(--font);transition:all .12s}
.fb.on{background:var(--bl);color:#fff;border-color:var(--bl)}.fb:hover:not(.on){background:var(--n3);color:var(--wh)}
.fsel{background:var(--n3);border:1px solid var(--bd2);border-radius:7px;padding:4px 8px;color:var(--wh);font-family:var(--font);font-size:11px;outline:none;cursor:pointer}
.fsel option{background:var(--n2)}.fsep{width:1px;height:16px;background:var(--bd2);margin:0 3px}
/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.st{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px}
/* THREADS / NOTES */
.thread{padding:11px 13px;background:var(--n2);border-radius:var(--r);margin-bottom:8px;border:1px solid var(--bd2);border-left:3px solid var(--bl);cursor:pointer;transition:all .12s;position:relative}
.thread:hover{background:var(--n3)}
.thread.pinned{border-left-color:var(--warn);background:rgba(245,158,11,.05)}
.pin-badge{position:absolute;top:8px;right:8px;font-size:12px;opacity:.8}
.tsub{font-size:12px;font-weight:600;color:var(--wh);margin-bottom:3px}.tmeta{font-size:10px;color:var(--mu);font-family:var(--mono);margin-bottom:5px}
.tbody{font-size:12px;color:var(--dim);line-height:1.65;white-space:pre-wrap}
.ttags{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.tupd{padding:7px 10px;background:var(--n4);border-radius:6px;margin-top:5px;font-size:11px;color:var(--dim);line-height:1.5}
.tumeta{font-size:10px;color:var(--mu);font-family:var(--mono);margin-bottom:2px}
/* TASKS */
.titem{display:flex;align-items:flex-start;gap:9px;padding:10px 13px;background:var(--n2);border-radius:var(--r);margin-bottom:6px;border:1px solid var(--bd2)}
.tcb{width:16px;height:16px;border-radius:4px;border:2px solid var(--mu2);flex-shrink:0;cursor:pointer;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .12s;font-size:9px;font-weight:700;color:#fff}
.tcb.dn{background:var(--ok);border-color:var(--ok)}
.tcont{flex:1;min-width:0}.ttit{font-size:12px;font-weight:500;color:var(--wh)}.ttit.dn{text-decoration:line-through;color:var(--mu)}
.tmta{font-size:10px;color:var(--mu);margin-top:3px;display:flex;gap:7px;flex-wrap:wrap}.ovd{color:var(--err)!important}
.t-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
/* MEETINGS */
.mtkl{border-left:3px solid var(--bll)!important}.mt1v1{border-left:3px solid var(--ok)!important}.mttym{border-left:3px solid var(--warn)!important}.mtmg{border-left:3px solid var(--err)!important}
/* PROFILE */
.phero{background:linear-gradient(135deg,var(--n3) 0%,var(--blp) 100%);border-radius:var(--rl);padding:20px;margin-bottom:16px;border:1px solid var(--bd2)}
/* MODAL */
.mov{position:absolute;inset:0;background:rgba(0,0,0,.72);z-index:200;display:flex;align-items:center;justify-content:center;padding:14px;opacity:0;pointer-events:none;transition:opacity .18s;border-radius:var(--rl)}
.mov.op{opacity:1;pointer-events:all}
.mo{background:var(--n2);border:1px solid var(--bd3);border-radius:var(--rl);padding:20px;width:100%;max-width:520px;max-height:580px;overflow-y:auto;transform:translateY(16px);transition:transform .18s}
.mov.op .mo{transform:translateY(0)}
.moh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mot{font-size:15px;font-weight:600;color:var(--wh)}
.mox{background:var(--n4);border:1px solid var(--bd2);border-radius:6px;color:var(--wh);cursor:pointer;font-size:14px;padding:4px 8px}.mox:hover{background:var(--n5)}
.mof{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--bd2)}
.mof-r{display:flex;gap:6px}
/* DETAIL */
#det{width:0;border-left:1px solid var(--bd2);background:var(--n1);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0}
#det.op{width:350px}
.dh{padding:13px 15px;border-bottom:1px solid var(--bd2);flex-shrink:0;display:flex;align-items:flex-start;gap:9px;background:var(--n2)}
.db{flex:1;overflow-y:auto;padding:13px 15px}
/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--bd2);margin-bottom:12px}
.tab{padding:7px 11px;font-size:11px;font-weight:500;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s}
.tab.on{color:var(--wh);border-bottom-color:var(--bl)}.tab:hover:not(.on){color:var(--dim)}
/* FORM */
.fg{margin-bottom:12px}.fl{font-size:11px;font-weight:600;color:var(--dim);margin-bottom:5px;display:block}
.fi,.fsel2,.fta{width:100%;background:var(--n3);border:1px solid var(--bd2);border-radius:7px;padding:7px 10px;color:var(--wh);font-family:var(--font);font-size:12px;outline:none;transition:border-color .12s}
.fi:focus,.fsel2:focus,.fta:focus{border-color:var(--bl)}.fta{resize:vertical;min-height:62px;line-height:1.6}.fsel2 option{background:var(--n2)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.add-row{display:flex;gap:5px;align-items:stretch}
.add-row .fsel2{flex:1}
.add-btn{background:var(--n4);border:1px solid var(--bd2);border-radius:7px;padding:7px 11px;color:var(--wh);cursor:pointer;flex-shrink:0;font-size:14px;font-weight:700;line-height:1;transition:all .12s}
.add-btn:hover{background:var(--n5)}
/* MULTISELECT */
.mw{background:var(--n3);border:1px solid var(--bd2);border-radius:7px;padding:4px 8px;display:flex;flex-wrap:wrap;gap:3px;min-height:34px;cursor:text;position:relative}
.mw:focus-within{border-color:var(--bl)}
.mchip{background:var(--blp);color:var(--bll);border-radius:5px;padding:2px 7px;font-size:11px;display:flex;align-items:center;gap:3px;border:1px solid rgba(37,99,235,.25)}
.mcx{cursor:pointer;opacity:.7;font-size:12px;color:var(--wh)}.mcx:hover{opacity:1}
.minp{background:transparent;border:none;color:var(--wh);font-family:var(--font);font-size:12px;outline:none;min-width:60px;flex:1;padding:2px 0}
.mdd{position:absolute;left:0;right:0;top:calc(100% + 3px);background:var(--n3);border:1px solid var(--bd3);border-radius:8px;z-index:500;max-height:160px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.mdd.op{display:block}
.mddi{padding:7px 11px;cursor:pointer;font-size:12px;color:var(--dim);transition:background .1s}
.mddi:hover{background:var(--n4);color:var(--wh)}.mddi.sel{color:var(--bll);font-weight:500}
.mddi-add{color:var(--bll);font-style:italic;border-top:1px solid var(--bd2)}
/* TOAST */
#tst{position:fixed;bottom:16px;right:16px;z-index:9000;background:var(--n3);border:1px solid var(--bd3);border-radius:9px;padding:10px 15px;font-size:12px;color:var(--wh);transform:translateY(50px);opacity:0;transition:all .25s;pointer-events:none;display:flex;align-items:center;gap:7px;box-shadow:0 4px 16px rgba(0,0,0,.5)}
#tst.sh{transform:translateY(0);opacity:1}
.tok{color:var(--ok)}.terr{color:var(--err)}
/* UPDATE INPUT */
.aupd{display:flex;gap:5px;margin-top:9px}
.aupd input,.aupd textarea{flex:1;background:var(--n4);border:1px solid var(--bd2);border-radius:7px;padding:6px 10px;color:var(--wh);font-family:var(--font);font-size:12px;outline:none;resize:vertical}
.aupd input:focus,.aupd textarea:focus{border-color:var(--bl)}
/* COLLAPSE */
.collapse-btn{background:transparent;border:none;color:var(--mu);cursor:pointer;font-size:11px;padding:4px 8px;border-radius:5px;font-family:var(--font);transition:all .12s}
.collapse-btn:hover{background:var(--n3);color:var(--wh)}
.collapsed-content{display:none}
.collapsed-content.open{display:block}
/* ATTACHMENT */
.attach-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--n4);border-radius:6px;margin-bottom:5px;border:1px solid var(--bd2)}
.attach-icon{font-size:16px;flex-shrink:0}
.attach-name{font-size:12px;color:var(--wh);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.attach-size{font-size:10px;color:var(--mu);flex-shrink:0}
/* MEETING MINUTES */
.mm-wrap{background:var(--n3);border:1px solid var(--bd2);border-radius:var(--r);overflow:visible;margin-top:10px}
.mm-tb{display:flex;align-items:center;gap:6px;padding:8px 12px;border-bottom:1px solid var(--bd2);background:var(--n4);flex-wrap:wrap;border-radius:var(--r) var(--r) 0 0}
.mm-area{width:100%;background:transparent;border:none;padding:12px;color:var(--wh);font-family:var(--font);font-size:12px;line-height:1.75;outline:none;resize:vertical;min-height:130px}
.mm-area::placeholder{color:var(--mu2)}
.mm-hint{font-size:10px;color:var(--mu);padding:6px 12px;border-top:1px solid var(--bd2);background:var(--n4);border-radius:0 0 var(--r) var(--r)}
.ai-prop{background:var(--n4);border:1px solid var(--bd2);border-radius:var(--r);padding:10px 12px;margin-bottom:7px;transition:all .15s}
.ai-prop.acc{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.07)}
.ai-prop.rej{opacity:.3}
.ai-pt{font-size:12px;font-weight:500;color:var(--wh);margin-bottom:5px}
.ai-pm{display:flex;gap:6px;flex-wrap:wrap;align-items:center;position:relative}
.ai-pm select,.ai-pm input[type=date]{background:var(--n3);border:1px solid var(--bd2);border-radius:5px;padding:3px 7px;color:var(--wh);font-family:var(--font);font-size:11px;outline:none}
.ai-pm select option{background:var(--n2)}
.ai-pa{display:flex;gap:5px;margin-top:7px}
.mm-out-body{background:var(--n4);border-radius:var(--r);padding:12px;font-size:12px;color:var(--dim);line-height:1.7;white-space:pre-wrap;margin-bottom:10px}
.dots span{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--bl);animation:dt 1.2s infinite;margin:0 2px}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dt{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
/* MISC */
.emp{text-align:center;padding:28px 16px;color:var(--mu)}.empi{font-size:26px;margin-bottom:8px;opacity:.3}
hr{border:none;border-top:1px solid var(--bd2);margin:12px 0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--n4);border-radius:8px}
</style>
</head>
<body>
<div id="loader"><div class="spin-logo">S</div><p>Načítám Skicák…</p></div>
<div id="app">
  <div id="sb">
    <div class="sb-top"><div class="logo">S</div><span class="logo-t">Skicák</span></div>
    <div class="sb-srch"><input id="gsi" placeholder="🔍 Hledat…" oninput="gsearch(this.value)"></div>
    <div class="sb-nav">
      <div class="nlbl">Přehled</div>
      <div class="ni on" id="ni-ja" onclick="go('ja')"><span class="nic">👤</span>Já</div>
      <div class="nlbl" style="margin-top:5px">Správa</div>
      <div class="ni" id="ni-firmy" onclick="go('firmy')"><span class="nic">🏢</span>Firmy</div>
      <div class="ni" id="ni-projekty" onclick="go('projekty')"><span class="nic">📁</span>Projekty</div>

  </div>
  <div id="tst"><span id="tic"></span><span id="tmsg"></span></div>
</div>
<script>
// ============================================================
// DB — klíč zachován pro kompatibilitu s předchozími daty
// ============================================================
const DBKEY = 'skicak_v6';
let DB, curPage = 'ja', _ms = {};

function initDB() {
  const tId=uid(),aId=uid(),alId=uid(),bId=uid(),oId=uid();
  const me=uid(),ter=uid(),adm=uid(),bed=uid(),mil=uid();
  return {
    firmy:[{id:tId,nazev:'TME Solutions',popis:'Naše vlastní firma',interni:true},{id:aId,nazev:'ALK',popis:'Alergie'},{id:alId,nazev:'Almirall',popis:'Dermatologie'},{id:bId,nazev:'Boehringer Ingelheim',popis:'Respiratory'},{id:oId,nazev:'Octapharma',popis:'Hematologie'}],
    osoby:[
      {id:me,jmeno:'Rostislav Křikava',pozice:'PM Lead',email:'rosta@tme.cz',tel:'',firmaId:tId,podrizeny:false,ja:true,prilohy:[]},
      {id:ter,jmeno:'Tereza Rydzyková',pozice:'Project Manager',email:'tereza@tme.cz',tel:'',firmaId:tId,podrizeny:true,prilohy:[]},
      {id:adm,jmeno:'Adam Funtali',pozice:'Project Manager',email:'adam@tme.cz',tel:'',firmaId:tId,podrizeny:true,prilohy:[]},
      {id:bed,jmeno:'Bedřich Břicháček',pozice:'Project Manager',email:'bedrich@tme.cz',tel:'',firmaId:tId,podrizeny:true,prilohy:[]},
      {id:mil,jmeno:'Milan Kocáb',pozice:'Project Manager',email:'milan@tme.cz',tel:'',firmaId:tId,podrizeny:true,prilohy:[]},
    ],
    projekty:[],ukoly:[],poznamky:[],meetingy:[],
    projektTypy:['Development','e-cast','e-cme','e-learning','e-mailing','MRP','vb.čl','jiné'],
    apiKey:''
  };
}

function loadDB() {
  try { const s=localStorage.getItem(DBKEY); if(s){DB=JSON.parse(s); migrateDB(); return;} } catch(e){}
  DB=initDB(); saveDB();
}

// migrace — doplní chybějící pole do starých dat
function migrateDB() {
  if(!DB.apiKey) DB.apiKey='';
  if(!DB.projektTypy) DB.projektTypy=['Development','e-cast','e-cme','e-learning','e-mailing','MRP','vb.čl','jiné'];
  DB.osoby.forEach(o=>{if(!o.prilohy)o.prilohy=[];});
  DB.projekty.forEach(p=>{if(!p.prilohy)p.prilohy=[];if(!p.firmaIds)p.firmaIds=p.firmaId?[p.firmaId]:[];});
  DB.firmy.forEach(f=>{if(!f.prilohy)f.prilohy=[];});
  DB.ukoly.forEach(u=>{if(!u.prilohy)u.prilohy=[];if(!u.poznamka)u.poznamka='';if(!u.tags)u.tags={firmaIds:[],projektIds:[],osobyIds:[]};});
  DB.poznamky.forEach(n=>{if(!n.pinned)n.pinned=false;});
}

function saveDB(){localStorage.setItem(DBKEY,JSON.stringify(DB));updBdg();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function tme(){return DB.firmy.find(f=>f.interni)||DB.firmy[0]}
function jaOs(){return DB.osoby.find(o=>o.ja)||DB.osoby[0]}
function gF(id){return DB.firmy.find(f=>f.id===id)}
function gO(id){return DB.osoby.find(o=>o.id===id)}
function gP(id){return DB.projekty.find(p=>p.id===id)}
function ini(n){if(!n)return'?';return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function fd(d){if(!d)return'';try{return new Date(d).toLocaleDateString('cs-CZ',{day:'numeric',month:'short'})}catch{return d}}
function today(){return new Date().toISOString().slice(0,10)}
function ovd(d){return d&&new Date(d)<new Date(today())}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fn(id){const f=gF(id);return f?f.nazev:'—'}
function on2(id){const o=gO(id);return o?o.jmeno:'—'}
const PS=['v přípravě','běžící','zastavený','dokončený'];
const MT=['s klientem','1:1','s týmem','s managementem'];
function sbdg(s){const m={'běžící':'srun','zastavený':'sstp','dokončený':'sdon','v přípravě':'sprp'};return`<span class="badge ${m[s]||'bgr2'}">${esc(s)}</span>`}
function updBdg(){const e=document.getElementById('bdg');if(e)e.textContent=DB.ukoly.filter(u=>!u.done).length}

// Sort úkolů: deadline ASC, poté datum zadání
function sortedUkoly(list) {
  return [...list].sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(a.deadline&&b.deadline) return new Date(a.deadline)-new Date(b.deadline);
    if(a.deadline) return -1;
    if(b.deadline) return 1;
    return new Date(a.created||0)-new Date(b.created||0);
  });
}

// NAV
function go(page){
  curPage=page;
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('on'));
  const n=document.getElementById('ni-'+page);if(n)n.classList.add('on');
  closeDet();
  const T={ja:'Já',firmy:'Firmy',projekty:'Projekty',osoby:'Osoby',ukoly:'Úkoly',meetingy:'Meetingy',poznamky:'Poznámky',nastaveni:'Nastavení'};
  document.getElementById('tbt').textContent=T[page]||page;
  document.getElementById('tbs').textContent='';document.getElementById('tba').innerHTML='';
  ({ja,firmy,projekty,osoby,ukoly,meetingy,poznamky,nastaveni}[page]||function(){})();
}

// TOAST
let tT;
function toast(msg,ok=true){const t=document.getElementById('tst');document.getElementById('tic').className=ok?'tok':'terr';document.getElementById('tic').textContent=ok?'✓':'✕';document.getElementById('tmsg').textContent=msg;t.classList.add('sh');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('sh'),2600);}

// MODAL
function openMo(title,body,lH,rH){document.getElementById('mot').textContent=title;document.getElementById('mob').innerHTML=body;document.getElementById('mof').innerHTML=`<div>${lH||''}</div><div class="mof-r">${rH||`<button class="btn bg bs" onclick="closeMo()">Zrušit</button>`}</div>`;document.getElementById('mov').classList.add('op');}
function closeMo(){document.getElementById('mov').classList.remove('op')}
function closeMoBg(e){if(e.target.id==='mov')closeMo()}
function openDet(h,b){document.getElementById('dh').innerHTML=h;document.getElementById('db').innerHTML=b;document.getElementById('det').classList.add('op');}
function closeDet(){document.getElementById('det').classList.remove('op')}

// MULTISELECT
function initMs(id,items,sel,addFnName){_ms[id]={items:[...items],selected:[...(sel||[])],addFn:addFnName};renderMs(id);}
function renderMs(id){
  const ms=_ms[id];if(!ms)return;const w=document.getElementById('mw-'+id);if(!w)return;
  const chips=ms.selected.map(sid=>{const it=ms.items.find(i=>i.id===sid);if(!it)return'';return`<span class="mchip">${esc(it.label)}<span class="mcx" onmousedown="event.preventDefault();msRm('${id}','${sid}')">×</span></span>`;}).join('');
  w.innerHTML=chips+`<input class="minp" id="mi-${id}" placeholder="${ms.selected.length?'':'Vyberte…'}" oninput="msFilter('${id}',this.value)" onfocus="msDdOp('${id}')" onblur="setTimeout(()=>msDdCl('${id}'),220)">`;
}
function msDdOp(id){msFilter(id,'');document.getElementById('mdd-'+id)?.classList.add('op')}
function msDdCl(id){document.getElementById('mdd-'+id)?.classList.remove('op')}
function msFilter(id,q){
  const ms=_ms[id];if(!ms)return;const dd=document.getElementById('mdd-'+id);if(!dd)return;
  const f=ms.items.filter(i=>i.label.toLowerCase().includes(q.toLowerCase()));
  const addRow=ms.addFn?`<div class="mddi mddi-add" onmousedown="event.preventDefault();${ms.addFn}()">＋ Přidat nový…</div>`:'';
  dd.innerHTML=f.map(i=>`<div class="mddi${ms.selected.includes(i.id)?' sel':''}" onmousedown="event.preventDefault();msPick('${id}','${i.id}')">${esc(i.label)}</div>`).join('')+addRow;
}
function msPick(id,sid){const ms=_ms[id];if(!ms)return;if(!ms.selected.includes(sid))ms.selected.push(sid);else ms.selected=ms.selected.filter(x=>x!==sid);renderMs(id);msFilter(id,'');}
function msRm(id,sid){const ms=_ms[id];if(!ms)return;ms.selected=ms.selected.filter(x=>x!==sid);renderMs(id);}
function msGet(id){return(_ms[id]||{}).selected||[]}
function msHtml(id){return`<div class="mw" id="mw-${id}"></div><div class="mdd" id="mdd-${id}"></div>`}
function selPlus(id,opts,addFn){return`<div class="add-row"><select class="fsel2" id="${id}">${opts}</select><button class="add-btn" onclick="${addFn}" title="Přidat nové">＋</button></div>`}

// HELPERS
function emp(ic,tx){return`<div class="emp"><div class="empi">${ic}</div><p style="font-size:12px">${esc(tx)}</p></div>`}
function avH(n,cls=''){return`<div class="av ${cls}">${ini(n)}</div>`}
function detTab(el,sid){el.closest('.tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');let s=el.closest('.tabs').nextElementSibling;while(s){s.style.display='none';s=s.nextElementSibling;}document.getElementById(sid)?.style.setProperty('display','block');}
function fOpts(sel,e){return(e?`<option value="">— Vyberte —</option>`:'')+DB.firmy.filter(f=>!f.interni).map(f=>`<option value="${f.id}"${sel===f.id?' selected':''}>${esc(f.nazev)}</option>`).join('')}
function allFOpts(sel){return`<option value="">—</option>`+DB.firmy.map(f=>`<option value="${f.id}"${sel===f.id?' selected':''}>${esc(f.nazev)}</option>`).join('')}
function prjOpts(sel){return`<option value="">— Bez projektu —</option>`+DB.projekty.map(p=>`<option value="${p.id}"${sel===p.id?' selected':''}>${esc(p.nazev)}</option>`).join('')}
function tmeOsOpts(sel){return DB.osoby.filter(o=>o.firmaId===tme().id).map(o=>`<option value="${o.id}"${sel===o.id?' selected':''}>${esc(o.jmeno.split(' ')[0])}</option>`).join('')}

// QUICK ADD
function qaFirma(){openMo('Přidat firmu',`<div class="fg"><label class="fl">Název *</label><input class="fi" id="qfn" autofocus></div><div class="fg"><label class="fl">Popis</label><input class="fi" id="qfp"></div>`,'',`<button class="btn bg bs" onclick="closeMo()">Zrušit</button><button class="btn bp bs" onclick="doQaFirma()">Přidat</button>`);}
function doQaFirma(){const n=document.getElementById('qfn').value.trim();if(!n)return toast('Název je povinný',false);DB.firmy.push({id:uid(),nazev:n,popis:document.getElementById('qfp').value.trim(),prilohy:[]});saveDB();closeMo();toast('Firma přidána — znovu otevřete formulář pro výběr');}
function qaOsoba(){openMo('Přidat osobu',`<div class="fr"><div class="fg"><label class="fl">Jméno *</label><input class="fi" id="qoj" autofocus></div><div class="fg"><label class="fl">Pozice</label><input class="fi" id="qop"></div></div><div class="fg"><label class="fl">Firma</label><select class="fsel2" id="qof">${DB.firmy.map(f=>`<option value="${f.id}"${f.id===tme().id?' selected':''}>${esc(f.nazev)}</option>`).join('')}</select></div>`,'',`<button class="btn bg bs" onclick="closeMo()">Zrušit</button><button class="btn bp bs" onclick="doQaOsoba()">Přidat</button>`);}
function doQaOsoba(){const j=document.getElementById('qoj').value.trim();if(!j)return toast('Jméno je povinné',false);DB.osoby.push({id:uid(),jmeno:j,pozice:document.getElementById('qop').value.trim(),firmaId:document.getElementById('qof').value,podrizeny:false,email:'',tel:'',prilohy:[]});saveDB();closeMo();toast('Osoba přidána');}
function qaProjekt(){openMo('Přidat projekt',`<div class="fg"><label class="fl">Název *</label><input class="fi" id="qprn" autofocus></div><div class="fr"><div class="fg"><label class="fl">Firma</label><select class="fsel2" id="qprf"><option value="">—</option>${fOpts()}</select></div><div class="fg"><label class="fl">PM</label><select class="fsel2" id="qprpm">${tmeOsOpts()}</select></div></div>`,'',`<button class="btn bg bs" onclick="closeMo()">Zrušit</button><button class="btn bp bs" onclick="doQaProjekt()">Přidat</button>`);}
function doQaProjekt(){const n=document.getElementById('qprn').value.trim();if(!n)return toast('Název je povinný',false);DB.projekty.push({id:uid(),nazev:n,firmaId:document.getElementById('qprf').value,firmaIds:[document.getElementById('qprf').value].filter(Boolean),pmId:document.getElementById('qprpm').value,typ:'jiné',status:'v přípravě',prilohy:[]});saveDB();closeMo();toast('Projekt přidán');}

// ATTACHMENT helpers
function attachHtml(entityId,entityType){
  return `<div class="fg"><label class="fl">Přílohy</label>
    <div id="attach-list-${entityId}"></div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <input type="file" id="attach-inp-${entityId}" style="display:none" multiple onchange="handleAttach('${entityId}','${entityType}',this)">
      <button class="btn bg bs" onclick="document.getElementById('attach-inp-${entityId}').click()">📎 Přiložit soubor</button>
    </div>
  </div>`;
}
function renderAttachList(entityId, entityType) {
  const entity = getEntity(entityId, entityType);
  const el = document.getElementById('attach-list-'+entityId);
  if(!el||!entity) return;
  const prilohy = entity.prilohy||[];
  el.innerHTML = prilohy.map((a,i)=>`<div class="attach-item">
    <span class="attach-icon">${a.type?.includes('image')?'🖼️':a.type?.includes('pdf')?'📄':'📎'}</span>
    <a class="attach-name" href="${a.data}" download="${esc(a.name)}" style="color:var(--bll)">${esc(a.name)}</a>
    <span class="attach-size">${(a.size/1024).toFixed(0)} KB</span>
    <button class="bi" style="font-size:11px;color:#fca5a5" onclick="delAttach('${entityId}','${entityType}',${i})">✕</button>
  </div>`).join('')||'<span style="font-size:11px;color:var(--mu)">Žádné přílohy</span>';
}
function getEntity(id, type) {
  if(type==='firma') return gF(id);
  if(type==='osoba') return gO(id);
  if(type==='projekt') return gP(id);
  if(type==='ukol') return DB.ukoly.find(u=>u.id===id);
  return null;
}
function handleAttach(entityId, entityType, inp) {
  const entity = getEntity(entityId, entityType);
  if(!entity) return;
  if(!entity.prilohy) entity.prilohy=[];
  const files = [...inp.files];
  let done=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      entity.prilohy.push({name:file.name,size:file.size,type:file.type,data:ev.target.result});
      done++;
      if(done===files.length){saveDB();renderAttachList(entityId,entityType);toast(`${done} soubor(ů) přiložen`);}
    };
    reader.readAsDataURL(file);
  });
  inp.value='';
}
function delAttach(entityId, entityType, idx) {
  const entity=getEntity(entityId,entityType);if(!entity)return;
  entity.prilohy.splice(idx,1);saveDB();renderAttachList(entityId,entityType);toast('Příloha smazána');
}

      <div><div style="font-size:18px;font-weight:600">${esc(me.jmeno)}</div><div style="font-size:12px;color:var(--mu);margin-top:3px">${esc(me.pozice)} · TME Solutions</div></div>
    </div></div>
    <div class="sg">
      <div class="sc" onclick="go('projekty')"><div class="sl">Projekty</div><div class="sv">${mp.length}</div></div>
      <div class="sc" onclick="go('ukoly')"><div class="sl">Úkoly</div><div class="sv">${mt.length}</div></div>

      <div class="sc" onclick="go('meetingy')"><div class="sl">Meetingy</div><div class="sv">${DB.meetingy.length}</div></div>
    </div>
    <div class="g2">
      <div>
        <div class="sh"><span class="st">Moje úkoly</span><button class="btn bp bs" onclick="newT()">+ Úkol</button></div>
        ${mt.slice(0,6).map(u=>tskH(u)).join('')}
        ${mt.length>6?`<button class="collapse-btn" onclick="toggleCollapse('ja-ukoly',this)">▾ Zobrazit dalších ${mt.length-6}</button><div id="ja-ukoly" class="collapsed-content">${mt.slice(6).map(u=>tskH(u)).join('')}</div>`:''}
        ${mt.length===0?emp('✅','Žádné úkoly'):''}
      </div>
      <div>
        <div class="sh"><span class="st">Moje projekty</span><button class="btn bp bs" onclick="newPrj()">+ Projekt</button></div>
        ${mp.slice(0,6).map(p=>`<div class="li" onclick="openPDet('${p.id}')">${avH(p.nazev,'avsm')}<div class="lim"><div class="lit">${esc(p.nazev)}</div><div class="lis">${esc((p.firmaIds||[]).map(fn).filter(Boolean).join(', '))}</div></div>${sbdg(p.status||'v přípravě')}</div>`).join('')}
        ${mp.length>6?`<button class="collapse-btn" onclick="toggleCollapse('ja-proj',this)">▾ Zobrazit dalších ${mp.length-6}</button><div id="ja-proj" class="collapsed-content">${mp.slice(6).map(p=>`<div class="li" onclick="openPDet('${p.id}')">${avH(p.nazev,'avsm')}<div class="lim"><div class="lit">${esc(p.nazev)}</div></div>${sbdg(p.status||'v přípravě')}</div>`).join('')}</div>`:''}
        ${mp.length===0?emp('📁','Žádné projekty'):''}
      </div>
    </div>
    ${mn.length?`<hr><div class="sh"><span class="st">Poslední poznámky</span></div>${mn.slice(0,3).map(n=>noteH(n)).join('')}`:''}`;
}

function toggleCollapse(id,btn){const el=document.getElementById(id);if(!el)return;el.classList.toggle('open');btn.textContent=el.classList.contains('open')?'▴ Skrýt':(btn.dataset.label||'▾ Zobrazit více');}

// ============================================================
// COMMON HTML BUILDERS
// ============================================================
function tskH(u,del,compact){
  const ps=(u.prirazena||[]).slice(0,3).map(id=>{const o=gO(id);return o?`<span class="av avxs" title="${esc(o.jmeno)}">${ini(o.jmeno)}</span>`:''}).join('');
  const tags=[...(u.tags?.firmaIds||[]).map(id=>`<span class="badge bgr2" style="font-size:9px">${esc(fn(id))}</span>`),(u.tags?.projektIds||[]).map(id=>`<span class="badge bbl" style="font-size:9px">${esc((gP(id)||{}).nazev||'')}</span>`)].flat().join('');
  return`<div class="titem" id="ti-${u.id}">
    <div class="tcb${u.done?' dn':''}" onclick="togT('${u.id}')">${u.done?'✓':''}</div>
    <div class="tcont">
      <div class="ttit${u.done?' dn':''}">${esc(u.nazev)}</div>
      <div class="tmta">${u.deadline?`<span class="${ovd(u.deadline)&&!u.done?'ovd':''}">${ovd(u.deadline)&&!u.done?'⚠ ':''}${fd(u.deadline)}</span>`:''}${u.firmaId?`<span>${esc(fn(u.firmaId))}</span>`:''}${u.projektId?`<span>${esc((gP(u.projektId)||{}).nazev||'')}</span>`:''}</div>
      ${ps?`<div style="display:flex;gap:3px;margin-top:3px">${ps}</div>`:''}
      ${tags?`<div class="t-tags">${tags}</div>`:''}
    </div>

function ukoly(){

    document.getElementById('content').innerHTML=`
      <div class="flt">
        ${['všechny','otevřené','prošlé','dokončené'].map(s=>`<button class="fb${sf===s?' on':''}" onclick="uf_('sf','${s}')">${s}</button>`).join('')}
        <div class="fsep"></div>
        <select class="fsel" onchange="uf_('of',this.value)"><option value="">Všechny osoby</option>${DB.osoby.map(o=>`<option value="${o.id}"${of===o.id?' selected':''}>${esc(o.jmeno.split(' ')[0])}</option>`).join('')}</select>

  document.getElementById('tba').innerHTML=`<button class="btn bp bs" onclick="newM()">+ Nový meeting</button>`;
  ren();
  function ren(){
    let list=[...DB.meetingy].sort((a,b)=>new Date(b.datum)-new Date(a.datum));
    if(tf!=='vše')list=list.filter(m=>m.typ===tf);
    document.getElementById('content').innerHTML=`
      <div class="flt">${['vše',...MT].map(t=>`<button class="fb${tf===t?' on':''}" onclick="mf_('${t}')">${t}</button>`).join('')}</div>
      ${list.length?list.map(m=>meetH(m,true)).join(''):emp('📅','Žádné meetingy')}
      <div style="margin-top:12px;text-align:center"><button class="btn bp" onclick="newM()">＋ Přidat meeting</button></div>`;
    window.mf_=(t)=>{tf=t;ren();};
  }
}

async function aiMM(mid){
  const m=DB.meetingy.find(m=>m.id===mid);if(!m)return;
  const raw=document.getElementById('mmta-'+mid)?.value.trim();if(!raw){toast('Napište nejprve zápis',false);return;}
  const btn=document.getElementById('mmbtn-'+mid);if(btn){btn.disabled=true;btn.textContent='⏳ Zpracovávám…';}
  const out=document.getElementById('mmout-'+mid);if(out)out.innerHTML=`<div style="display:flex;align-items:center;gap:8px;color:var(--mu);font-size:12px;padding:8px 0"><div class="dots"><span></span><span></span><span></span></div>Claude zpracovává…</div>`;
  const osobyList=DB.osoby.map(o=>o.jmeno).join(', ');
  const sys=`Jsi asistent pro zpracování zápisů ze schůzek, digitální agentury TME Solutions (farma/healthcare).
Vrať POUZE validní JSON bez markdown, komentářů ani backticks:
{"firma":"","ucastnici":[],"temata":[],"hlavniBody":[{"typ":"info|rozhodnutí|problém","text":""}],"dobreVedet":[],"ukoly":[{"nazev":"","popis":"","prirazenaOsoba":"","deadline":"","priorita":"vysoká|střední|nízká"}],"shrnuti":""}
Osoby v systému: ${osobyList}
Detekuj VŠECHNY úkoly a akce. Přiřaď osoby pokud jsou zmíněné. Deadline formát YYYY-MM-DD.
Vrať POUZE JSON, nic jiného.`;
  const ctx=`Firma: ${(m.firmaIds||[]).map(fn).join(', ')||'?'}, projekt: ${(m.projektIds||[]).map(id=>(gP(id)||{}).nazev||'').filter(Boolean).join(', ')||'?'}, účastníci: ${(m.ucastnici||[]).map(on2).join(', ')||'?'}, typ: ${m.typ||'?'}`;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':DB.apiKey||''},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:[{role:'user',content:`${ctx}\n\nZápis:\n${raw}`}]})});
    const d=await r.json();
    if(d.error)throw new Error(d.error.message);
    const txt=d.content?.find(b=>b.type==='text')?.text||'';
    const res=JSON.parse(txt.replace(/```json|```/g,'').trim());
    m.minutesData=res;saveDB();renderMMOut(mid,res);
  }catch(e){
    if(out)out.innerHTML=`<div style="color:var(--err);font-size:12px;padding:8px">${e.message?.includes('401')||e.message?.includes('api_key')?'Neplatný API klíč — nastavte ho v sekci ⚙️ Nastavení.':'Chyba: '+esc(String(e))}</div>`;
    toast('Chyba AI',false);
  }
  if(btn){btn.disabled=false;btn.textContent='✨ Zpracovat s AI';}
}

function renderMMOut(mid,r){
  const out=document.getElementById('mmout-'+mid);if(!out)return;
  const tOs=DB.osoby.filter(o=>o.firmaId===tme().id);
  let h=`<div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">📋 Strukturovaný zápis</div>`;
  h+=`<div class="mm-out-body">`;
  if(r.firma)h+=`🏢 <strong>Firma:</strong> ${esc(r.firma)}\n`;
  if(r.ucastnici?.length)h+=`👥 <strong>Účastníci:</strong> ${r.ucastnici.map(esc).join(', ')}\n`;
  if(r.temata?.length)h+=`\n📌 <strong>Témata:</strong>\n${r.temata.map(t=>`  • ${esc(t)}`).join('\n')}\n`;
  if(r.hlavniBody?.length){const ic={'info':'ℹ️','rozhodnutí':'✅','problém':'⚠️'};h+=`\n📝 <strong>Hlavní body:</strong>\n${r.hlavniBody.map(b=>`  ${ic[b.typ]||'•'} ${esc(b.text)}`).join('\n')}\n`;}
  if(r.dobreVedet?.length)h+=`\n💡 <strong>Dobré vědět:</strong>\n${r.dobreVedet.map(d=>`  • ${esc(d)}`).join('\n')}\n`;
  if(r.shrnuti)h+=`\n💬 ${esc(r.shrnuti)}`;
  h+=`</div>`;
  if(r.ukoly?.length){
    h+=`<div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 8px">✅ Navrhované úkoly (${r.ukoly.length})</div>`;
    r.ukoly.forEach((u,i)=>{
      let mo='';if(u.prirazenaOsoba){const f=DB.osoby.find(o=>o.jmeno.toLowerCase().includes(u.prirazenaOsoba.toLowerCase().split(' ')[0].toLowerCase()));if(f)mo=f.id;}
      const priB=u.priorita==='vysoká'?'brd':u.priorita==='střední'?'bgr2':'bgr';
      h+=`<div class="ai-prop" id="ap-${mid}-${i}">
        <div class="ai-pt">${esc(u.nazev)}</div>
        ${u.popis?`<div style="font-size:11px;color:var(--mu);margin-bottom:5px">${esc(u.popis)}</div>`:''}
        <div class="ai-pm">
          <select id="apos-${mid}-${i}"><option value="">— Přiřadit —</option>${tOs.map(o=>`<option value="${o.id}"${mo===o.id?' selected':''}>${esc(o.jmeno)}</option>`).join('')}${DB.osoby.filter(o=>!tOs.includes(o)).map(o=>`<option value="${o.id}">${esc(o.jmeno)}</option>`).join('')}</select>
          <input type="date" id="apd-${mid}-${i}" value="${u.deadline||''}">
          <span class="badge ${priB}">${esc(u.priorita||'střední')}</span>
        </div>
        <div class="ai-pa">
          <button class="btn bok bs" onclick="accAIT('${mid}',${i})">✓ Přijmout</button>
          <button class="btn brd bs" onclick="document.getElementById('ap-${mid}-${i}').classList.add('rej')">✕</button>
        </div>
      </div>`;
    });
    h+=`<button class="btn bp bs" style="margin-top:4px" onclick="accAllAIT('${mid}')">✓ Přijmout všechny</button>`;
  }
  h+=`<div style="margin-top:10px"><button class="btn bg bs" onclick="copyMM('${mid}')">📋 Kopírovat zápis</button></div>`;
  out.innerHTML=h;
}

function accAIT(mid,i){
  const m=DB.meetingy.find(m=>m.id===mid);if(!m?.minutesData?.ukoly)return;
  const u=m.minutesData.ukoly[i];if(!u)return;
  const osId=document.getElementById(`apos-${mid}-${i}`)?.value;
  const dead=document.getElementById(`apd-${mid}-${i}`)?.value;
  DB.ukoly.push({id:uid(),nazev:u.nazev,popis:u.popis||'',prirazena:osId?[osId]:[jaOs().id],deadline:dead||'',projektId:m.projektIds?.[0]||'',firmaId:m.firmaIds?.[0]||'',tags:{firmaIds:m.firmaIds||[],projektIds:m.projektIds||[]},done:false,created:today(),poznamka:'',prilohy:[]});
  saveDB();
  const el=document.getElementById(`ap-${mid}-${i}`);
  if(el){el.classList.add('acc');el.querySelector('.ai-pa').innerHTML=`<span style="font-size:11px;color:var(--ok)">✓ Uloženo</span>`;}
  toast(`Úkol přidán: ${u.nazev}`);
}
function accAllAIT(mid){const m=DB.meetingy.find(m=>m.id===mid);if(!m?.minutesData?.ukoly)return;let cnt=0;m.minutesData.ukoly.forEach((_,i)=>{const el=document.getElementById(`ap-${mid}-${i}`);if(el&&!el.classList.contains('acc')&&!el.classList.contains('rej')){accAIT(mid,i);cnt++;}});if(cnt)toast(`${cnt} úkolů přidáno`);}
function copyMM(mid){
  const m=DB.meetingy.find(m=>m.id===mid);if(!m?.minutesData)return;
  const r=m.minutesData;let t=`# ${m.nazev}\n${fd(m.datum)} · ${m.typ||''}\n\n`;
  if(r.firma)t+=`Firma: ${r.firma}\n`;if(r.ucastnici?.length)t+=`Účastníci: ${r.ucastnici.join(', ')}\n\n`;
  if(r.temata?.length)t+=`## Témata\n${r.temata.map(x=>`- ${x}`).join('\n')}\n\n`;
  if(r.hlavniBody?.length)t+=`## Hlavní body\n${r.hlavniBody.map(b=>`- [${b.typ}] ${b.text}`).join('\n')}\n\n`;
  if(r.dobreVedet?.length)t+=`## Dobré vědět\n${r.dobreVedet.map(x=>`- ${x}`).join('\n')}\n\n`;
  if(r.ukoly?.length)t+=`## Úkoly\n${r.ukoly.map(u=>`- [ ] ${u.nazev}${u.prirazenaOsoba?' (@'+u.prirazenaOsoba+')':''}${u.deadline?' do '+u.deadline:''}`).join('\n')}\n\n`;
  if(r.shrnuti)t+=`## Shrnutí\n${r.shrnuti}`;
  navigator.clipboard.writeText(t).then(()=>toast('Zkopírováno')).catch(()=>toast('Kopírování selhalo',false));
}
function mmSel(mid,type){
  const ta=document.getElementById('mmta-'+mid);if(!ta)return;
  const sel=ta.value.substring(ta.selectionStart,ta.selectionEnd).trim()||ta.value.trim();
  if(!sel){toast('Označte část textu',false);return;}
  const m=DB.meetingy.find(m=>m.id===mid);
  closeDet();
  if(type==='t')setTimeout(()=>buildT(sel,(m?.ucastnici||[]).slice(0,1),m?.projektIds?.[0]||'',m?.firmaIds?.[0]||''),60);
  else setTimeout(()=>buildN(null,sel,m?.ucastnici||[],m?.firmaIds||[],m?.projektIds||[]),60);
}
function delM(id){if(!confirm('Smazat meeting?'))return;DB.meetingy=DB.meetingy.filter(m=>m.id!==id);saveDB();go('meetingy');toast('Meeting smazán')}

function togglePin(id){const n=DB.poznamky.find(n=>n.id===id);if(!n)return;n.pinned=!n.pinned;saveDB();openNDet(id);toast(n.pinned?'Poznámka přichycena':'Poznámka odšpendlena');}
function addNUpd(id){const i=document.getElementById('ni-'+id);if(!i)return;const t=i.value.trim();if(!t)return;const n=DB.poznamky.find(n=>n.id===id);if(!n)return;if(!n.updates)n.updates=[];n.updates.push({datum:today(),text:t});saveDB();openNDet(id);toast('Přidáno')}

function gsearch(q){
  if(!q||q.length<2){if(curPage==='s')go('ja');return;}
  const res=[];
  DB.firmy.filter(f=>f.nazev.toLowerCase().includes(q.toLowerCase())).forEach(f=>res.push({type:'Firma',title:f.nazev,sub:f.popis||'',fn:()=>openFDet(f.id)}));
  DB.osoby.filter(o=>o.jmeno.toLowerCase().includes(q.toLowerCase())).forEach(o=>res.push({type:'Osoba',title:o.jmeno,sub:o.pozice||'',fn:()=>openODet(o.id)}));
  DB.projekty.filter(p=>p.nazev.toLowerCase().includes(q.toLowerCase())||(p.epid||'').toLowerCase().includes(q.toLowerCase())).forEach(p=>res.push({type:'Projekt',title:p.nazev,sub:(p.firmaIds||[]).map(fn).join(', '),fn:()=>openPDet(p.id)}));
  DB.poznamky.filter(n=>(n.predmet+(n.obsah||'')).toLowerCase().includes(q.toLowerCase())).forEach(n=>res.push({type:'Poznámka',title:n.predmet,sub:'',fn:()=>openNDet(n.id)}));
  DB.ukoly.filter(u=>u.nazev.toLowerCase().includes(q.toLowerCase())).forEach(u=>res.push({type:'Úkol',title:u.nazev,sub:'',fn:()=>openTDet(u.id)}));
  curPage='s';document.querySelectorAll('.ni').forEach(e=>e.classList.remove('on'));
  document.getElementById('tbt').textContent='Hledání';document.getElementById('tbs').textContent=`${res.length} výsl. pro „${q}"`;
  document.getElementById('tba').innerHTML='';window._sr=res.map(r=>r.fn);
  document.getElementById('content').innerHTML=res.map((r,i)=>`<div class="li" onclick="window._sr[${i}]()">${avH(r.title,'avsm')}<div class="lim"><div style="font-size:9px;font-weight:700;color:var(--bll);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px">${esc(r.type)}</div><div class="lit">${esc(r.title)}</div><div class="lis">${esc(r.sub)}</div></div></div>`).join('')||emp('🔍',`Nic pro „${q}"`);
}

function newFirma(){openMo('Nová firma',`<div class="fg"><label class="fl">Název *</label><input class="fi" id="fn" autofocus></div><div class="fg"><label class="fl">Popis</label><input class="fi" id="fp"></div>`,'',`<button class="btn bg bs" onclick="closeMo()">Zrušit</button><button class="btn bp bs" onclick="savFirma()">Uložit</button>`);}
function editFirma(id){const f=gF(id);if(!f)return;openMo('Upravit firmu',`<div class="fg"><label class="fl">Název *</label><input class="fi" id="fn" value="${esc(f.nazev)}"></div><div class="fg"><label class="fl">Popis</label><input class="fi" id="fp" value="${esc(f.popis||'')}"></div>`,`<button class="btn brd bs" onclick="delFirma('${id}')">Smazat</button>`,`<button class="btn bg bs" onclick="closeMo()">Zrušit</button><button class="btn bp bs" onclick="savFirma('${id}')">Uložit</button>`);}
function savFirma(eid){const n=document.getElementById('fn').value.trim();if(!n)return toast('Název je povinný',false);if(eid){const f=gF(eid);f.nazev=n;f.popis=document.getElementById('fp').value.trim();}else DB.firmy.push({id:uid(),nazev:n,popis:document.getElementById('fp').value.trim(),prilohy:[]});saveDB();closeMo();go('firmy');toast(eid?'Firma upravena':'Firma přidána');}
function delFirma(id){if(!confirm('Smazat firmu?'))return;DB.firmy=DB.firmy.filter(f=>f.id!==id);DB.osoby.forEach(o=>{if(o.firmaId===id)o.firmaId=null});DB.projekty.forEach(p=>{p.firmaIds=(p.firmaIds||[]).filter(x=>x!==id);});saveDB();closeMo();go('firmy');toast('Firma smazána');}

function editOs(id){

    <div class="fg"><label class="fl">Firma</label>${selPlus('of',DB.firmy.map(f=>`<option value="${f.id}"${o.firmaId===f.id?' selected':''}>${esc(f.nazev)}</option>`).join(''),'qaFirma()')}</div>

function savOs(eid){const j=document.getElementById('oj').value.trim();if(!j)return toast('Jméno je povinné',false);const d={jmeno:j,pozice:document.getElementById('op').value.trim(),firmaId:document.getElementById('of').value,email:document.getElementById('oe').value.trim(),tel:document.getElementById('ot').value.trim(),popis:document.getElementById('od').value.trim(),podrizeny:document.getElementById('opod').checked};if(eid){const o=gO(eid);Object.assign(o,d);}else DB.osoby.push({id:uid(),...d,prilohy:[]});saveDB();closeMo();go('osoby');toast(eid?'Osoba upravena':'Osoba přidána');}
function delOs(id){if(!confirm('Smazat?'))return;DB.osoby=DB.osoby.filter(o=>o.id!==id);saveDB();closeMo();go('osoby');toast('Osoba smazána');}

function newT_os(id){closeDet();setTimeout(()=>newT(id),60)}

function newT_meet(id){const m=DB.meetingy.find(m=>m.id===id);closeDet();setTimeout(()=>buildT('',m?.ucastnici?.slice(0,1)||[],m?.projektIds?.[0]||'',m?.firmaIds?.[0]||''),60);}
function editT(id){
  const u=DB.ukoly.find(u=>u.id===id);if(!u)return;

function saveEditT(id){
  const u=DB.ukoly.find(u=>u.id===id);if(!u)return;
  const n=document.getElementById('un').value.trim();if(!n)return toast('Název je povinný',false);
  const prjId=document.getElementById('uprj').value;
  const firmaId=document.getElementById('uf').value;
  u.nazev=n;u.popis=document.getElementById('upopis').value.trim();
  u.prirazena=msGet('uos');u.deadline=document.getElementById('ud').value;
  u.projektId=prjId;u.firmaId=firmaId;
  u.tags={firmaIds:firmaId?[firmaId]:[],projektIds:prjId?[prjId]:[],osobyIds:msGet('uos')};
  saveDB();closeMo();go(curPage);toast('Úkol upraven');
}
function savT(){
  const n=document.getElementById('un').value.trim();if(!n)return toast('Název je povinný',false);
  const prjId=document.getElementById('uprj').value;
  const firmaId=document.getElementById('uf').value;
  const prj=gP(prjId);

  saveDB();closeMo();go(curPage);toast('Úkol přidán');
}

// POZNÁMKA
function buildN(ex,text,pfOs,pfFirmy,pfProj,pfMeetId){
  _ms={};const t=tme();
  const osI=[...DB.osoby.filter(o=>o.firmaId===t.id),...DB.osoby.filter(o=>o.firmaId!==t.id)].map(o=>({id:o.id,label:o.jmeno}));

  openMo(ex?'Upravit poznámku':'Nová poznámka',`
    <div class="fg"><label class="fl">Předmět *</label><input class="fi" id="npred" value="${esc(ex?ex.predmet:(text?text.split('\n')[0].slice(0,80):''))}" autofocus></div>
    <div class="fg"><label class="fl">Obsah</label><textarea class="fta" id="nobs" style="min-height:70px">${esc(ex?ex.obsah:(text||''))}</textarea></div>
    <div class="fg"><label class="fl">Datum</label><input class="fi" id="ndat" type="date" value="${ex?ex.datum:today()}"></div>
    <div class="fg"><label class="fl">Osoby</label>${msHtml('nos')}<div style="margin-top:4px"><button class="btn bg bs" onclick="qaOsoba()" style="font-size:10px">＋ Přidat novou osobu</button></div></div>
    <div class="fg"><label class="fl">Firmy</label>${msHtml('nfirmy')}<div style="margin-top:4px"><button class="btn bg bs" onclick="qaFirma()" style="font-size:10px">＋ Přidat novou firmu</button></div></div>
    <div class="fg"><label class="fl">Projekty</label>${msHtml('nproj')}<div style="margin-top:4px"><button class="btn bg bs" onclick="qaProjekt()" style="font-size:10px">＋ Přidat nový projekt</button></div></div>`,'',
    `<button class="btn bg bs" onclick="closeMo()">Zrušit</button><button class="btn bp bs" onclick="savN('${ex?ex.id:''}','${pfMeetId||''}')">${ex?'Uložit':'Přidat'}</button>`);
  requestAnimationFrame(()=>{
    initMs('nos',osI,ex?ex.osobyIds:(pfOs||[]),'qaOsoba');
    initMs('nfirmy',fI,ex?ex.firmaIds:(pfFirmy||[]),'qaFirma');

function newN(){buildN()}
function newN_os(id){closeDet();setTimeout(()=>buildN(null,'',id?[id]:[],[],[]),60)}
function newN_prj(id){closeDet();setTimeout(()=>buildN(null,'',[],[],[id]),60)}
function newN_meet(id){const m=DB.meetingy.find(m=>m.id===id);closeDet();setTimeout(()=>buildN(null,'',m?.ucastnici||[],m?.firmaIds||[],m?.projektIds||[],id),60);}
function editN(id){const n=DB.poznamky.find(n=>n.id===id);if(n)buildN(n);}
function savN(eid,meetId){
  const p=document.getElementById('npred').value.trim();if(!p)return toast('Předmět je povinný',false);
  const d={predmet:p,obsah:document.getElementById('nobs').value.trim(),datum:document.getElementById('ndat').value,osobyIds:msGet('nos'),firmaIds:msGet('nfirmy'),projektIds:msGet('nproj')};
  if(meetId)d.meetingId=meetId;
  if(eid){const n=DB.poznamky.find(n=>n.id===eid);Object.assign(n,d);}else DB.poznamky.push({id:uid(),...d,created:today(),pinned:false});
  saveDB();closeMo();go(curPage);toast(eid?'Poznámka upravena':'Poznámka přidána');
}

// EXPORT / IMPORT
function expData(){const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`skicak-${today()}.json`;a.click();toast('Data exportována');}
function trigImp(){document.getElementById('impf').click()}
function impData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(!d.firmy||!d.osoby)return toast('Neplatný soubor',false);DB=d;migrateDB();saveDB();go('ja');toast('Data importována');}catch{toast('Chyba importu',false);}};r.readAsText(f);e.target.value='';}

// INIT
loadDB();
setTimeout(()=>{
  document.getElementById('loader').style.display='none';
  document.getElementById('app').classList.add('ready');
  go('ja');
  if('serviceWorker' in navigator) {
    if(location.protocol === 'file:') {
      console.warn('Skicák: SW nelze registrovat přes file://, spusť přes lokální server nebo nasaď na hosting.');
    } else {
      navigator.serviceWorker.register('./sw.js')
